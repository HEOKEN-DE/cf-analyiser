<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="popup" data-theme="dark">
    <div class="popup-header">
      <img src="icons/icon128.png" alt="" class="popup-icon">
      <div class="popup-title">
        <span class="title-cloud">Cloud</span><span class="title-flare">flare</span>
        <span class="title-sub">Analyiser</span>
      </div>
    </div>

    <div class="popup-section">
      <div class="setting-row">
        <div class="setting-info">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 256 256" fill="currentColor" class="setting-icon" id="theme-icon"></svg>
          <span class="setting-label">Theme</span>
        </div>
        <button class="toggle-btn" id="theme-toggle">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
          <span class="toggle-text" id="theme-text">Dark</span>
        </button>
      </div>

      <div class="setting-row">
        <div class="setting-info">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 256 256" fill="currentColor" class="setting-icon" id="visibility-icon"></svg>
          <span class="setting-label">Show bar by default</span>
        </div>
        <button class="toggle-btn" id="visibility-toggle">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
          <span class="toggle-text" id="visibility-text">On</span>
        </button>
      </div>
    </div>

    <div class="popup-section popup-actions">
      <button class="action-btn" id="toggle-site-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 256 256" fill="currentColor" id="site-icon"></svg>
        <span id="toggle-site-text">Hide on this site</span>
      </button>
    </div>

    <div class="popup-footer">
      <a href="https://buymeacoffee.com/wasim.alhafez" target="_blank" rel="noopener" class="coffee-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 256 256" fill="currentColor" class="coffee-icon">

    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
